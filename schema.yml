  /v1/adjustments/:
    get:
      operationId: adjustments_list
      description: Retorna una lista paginada de ajustes de inventario de la empresa
        del usuario autenticado. Filtrable por sucursal y tipo de ajuste.
      summary: Listar ajustes de inventario
      parameters:
      - in: query
        name: adjustment_type
        schema:
          type: string
          enum:
          - COUNT_CORRECTION
          - DAMAGE
          - INITIAL_LOAD
          - MANUAL_DECREASE
          - MANUAL_INCREASE
          - SAMPLE
          - TRANSFER_IN
          - TRANSFER_OUT
        description: Filtrar por tipo de ajuste.
      - in: query
        name: branch_id
        schema:
          type: string
        description: Filtrar por ID (ULID) de sucursal.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Inventory Adjustments
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInventoryAdjustmentListList'
          description: ''
    post:
      operationId: adjustments_create
      description: |2

        Crea un ajuste de inventario y actualiza el stock de la sucursal en una sola operación atómica.

        **Reglas por tipo de ajuste:**

        | Tipo | Campo requerido en `details` |
        |------|------------------------------|
        | `COUNT_CORRECTION` | `quantity_after` — stock final deseado (≥ 0) |
        | Todos los demás | `quantity_change` — delta (≠ 0; puede ser negativo para decrementos) |

        **Tipos disponibles:**
        - `INITIAL_LOAD` — Carga inicial de inventario
        - `MANUAL_INCREASE` — Incremento manual
        - `MANUAL_DECREASE` — Decremento manual
        - `COUNT_CORRECTION` — Corrección por conteo físico
        - `DAMAGE` — Daño / merma
        - `SAMPLE` — Muestra
        - `TRANSFER_IN` — Entrada por traslado
        - `TRANSFER_OUT` — Salida por traslado

        **Restricciones:**
        - La sucursal (`branch`) debe pertenecer a la empresa del usuario autenticado.
        - Cada producto debe tener un registro de stock existente en la sucursal.
        - El stock resultante no puede ser negativo.
        - Se requiere al menos un ítem en `details`.
      summary: Crear ajuste de inventario
      tags:
      - Inventory Adjustments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryAdjustmentWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InventoryAdjustmentWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InventoryAdjustmentWriteRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryAdjustmentDetailRead'
          description: ''
  /v1/adjustments/{id}/:
    get:
      operationId: adjustments_retrieve
      description: Retorna el ajuste de inventario completo con todos sus ítems (`details`),
        incluyendo nombre y SKU de cada producto y los snapshots de cantidad antes/cambio/después.
