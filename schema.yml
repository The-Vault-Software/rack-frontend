components:
  schemas:
    Account:
      type: object
      description: |-
        Main serializer for creating and viewing accounts (purchases).
        Supports nested creation of account details.
        Increases stock when account is created.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        branch:
          type: string
          format: uuid
        branch_name:
          type: string
          readOnly: true
        provider:
          type: string
          format: uuid
          nullable: true
        provider_name:
          type: string
          readOnly: true
          default: No Provider
        total_amount_usd:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        payment_status:
          allOf:
          - $ref: '#/components/schemas/PaymentStatus2d7Enum'
          readOnly: true
        seq_number:
          type: integer
          readOnly: true
        account_details:
          type: array
          items:
            $ref: '#/components/schemas/AccountDetail'
          readOnly: true
        total_paid:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - account_details
      - branch
      - branch_name
      - created_at
      - id
      - payment_status
      - provider_name
      - seq_number
      - total_amount_usd
      - total_paid
      - updated_at
    AccountDetail:
      type: object
      description: |-
        Serializer for AccountDetail - used for reading account details.
        For writing, use the nested 'details' field in AccountSerializer.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product:
          type: string
          format: uuid
        product_name:
          type: string
          readOnly: true
        product_sku:
          type: string
          readOnly: true
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        unit_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - id
      - product
      - product_name
      - product_sku
      - quantity
      - unit_price
    AccountDetailRequest:
      type: object
      description: |-
        Serializer for AccountDetail - used for reading account details.
        For writing, use the nested 'details' field in AccountSerializer.
      properties:
        product:
          type: string
          format: uuid
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      required:
      - product
      - quantity
    AccountList:
      type: object
      description: |-
        Lightweight serializer for listing accounts.
        Includes computed fields for display purposes.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        seq_number:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        total_amount_usd:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        payment_status:
          allOf:
          - $ref: '#/components/schemas/PaymentStatus2d7Enum'
          readOnly: true
        branch:
          type: string
          format: uuid
          readOnly: true
        branch_name:
          type: string
          readOnly: true
        provider:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        provider_name:
          type: string
          readOnly: true
          default: No Provider
        total_paid:
          type: string
          readOnly: true
      required:
      - branch
      - branch_name
      - created_at
      - id
      - payment_status
      - provider
      - provider_name
      - seq_number
      - total_amount_usd
      - total_paid
      - updated_at
    AccountPayment:
      type: object
      description: |-
        Serializer for creating and viewing account payments.
        Handles currency conversion and payment status updates.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        currency:
          type: string
          maxLength: 3
        payment_method:
          type: string
        payment_date:
          type: string
          format: date-time
          readOnly: true
        REF:
          type: string
          nullable: true
          maxLength: 100
        total_amount_usd:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        total_amount_ves:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        exchange_rate:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - currency
      - exchange_rate
      - id
      - payment_date
      - payment_method
      - total_amount_usd
      - total_amount_ves
    AccountPaymentRequest:
      type: object
      description: |-
        Serializer for creating and viewing account payments.
        Handles currency conversion and payment status updates.
      properties:
        currency:
          type: string
          minLength: 1
          maxLength: 3
        payment_method:
          type: string
          minLength: 1
        REF:
          type: string
          nullable: true
          maxLength: 100
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          writeOnly: true
          description: Payment amount in the specified currency
      required:
      - amount
      - currency
      - payment_method
    AccountRequest:
      type: object
      description: |-
        Main serializer for creating and viewing accounts (purchases).
        Supports nested creation of account details.
        Increases stock when account is created.
      properties:
        branch:
          type: string
          format: uuid
        provider:
          type: string
          format: uuid
          nullable: true
        details:
          type: array
          items:
            type: object
            additionalProperties: {}
          writeOnly: true
          description: List of account details with 'product' (ULID) and 'quantity'
            fields
      required:
      - branch
      - details
    AdjustmentDetailItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product:
          type: string
          format: uuid
          readOnly: true
        product_name:
          type: string
          readOnly: true
        product_sku:
          type: string
          readOnly: true
        quantity_before:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,10})?$
          readOnly: true
        quantity_change:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,10})?$
          readOnly: true
        quantity_after:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,10})?$
          readOnly: true
      required:
      - id
      - product
      - product_name
      - product_sku
      - quantity_after
      - quantity_before
      - quantity_change
    AdjustmentTypeEnum:
      enum:
      - INITIAL_LOAD
      - MANUAL_INCREASE
      - MANUAL_DECREASE
      - COUNT_CORRECTION
      - DAMAGE
      - SAMPLE
      - TRANSFER_IN
      - TRANSFER_OUT
      type: string
      description: |-
        * `INITIAL_LOAD` - Carga inicial
        * `MANUAL_INCREASE` - Incremento manual
        * `MANUAL_DECREASE` - Decremento manual
        * `COUNT_CORRECTION` - Corrección por conteo físico
        * `DAMAGE` - Daño / merma
        * `SAMPLE` - Muestra
        * `TRANSFER_IN` - Entrada por traslado
        * `TRANSFER_OUT` - Salida por traslado
    Branch:
